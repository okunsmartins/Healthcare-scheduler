# Quality gate — mirrors `npm run validate` plus a production build.
# Runs on pushes to main and on every pull request. See docs/IMPLEMENTATION_PLAN.md
# (Phase 1: ci/initial-quality-pipeline).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      # Placeholder env only satisfies startup validation (src/lib/env) so the
      # production build can run. These are NOT real secrets and the build does
      # not contact Supabase. Real values live in deployment env / GitHub secrets.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          EMAIL_PROVIDER: console
          CRON_SECRET: ci-placeholder-cron-secret-0123456789

  # Applies the migrations to a real (local) Supabase Postgres and runs the pgTAP
  # cross-tenant isolation test. This is what keeps an RLS regression from merging.
  db-isolation:
    name: RLS isolation test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Start only the database container (every other service excluded). Migrations
      # in supabase/migrations are applied on start. Linux runners have no issue with
      # the 553xx ports the config uses.
      - name: Start local database
        run: >
          supabase start
          -x studio,realtime,storage,imgproxy,kong,rest,meta,edge-runtime,functions,analytics,vector,inbucket
          --ignore-health-check

      - name: Run RLS isolation test (pgTAP)
        run: supabase test db

      - name: Stop local stack
        if: always()
        run: supabase stop --no-backup
